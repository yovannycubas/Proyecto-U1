<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow – Gestión de Tareas</title>
  <meta name="description" content="Gestión de tareas con sincronización en la nube y autenticación segura." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ══════════════════════════════════════
       LOADING OVERLAY
  ══════════════════════════════════════ -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- ══════════════════════════════════════
       AUTH SCREEN (shown when not logged in)
  ══════════════════════════════════════ -->
  <div id="auth-screen" class="auth-screen" style="display:none">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <span class="logo-icon">✦</span>
        <span class="logo-title-auth">TaskFlow</span>
      </div>
      <p class="auth-subtitle">Gestiona tus tareas en la nube</p>

      <!-- Tabs -->
      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" data-tab="login" id="tab-login" role="tab" aria-selected="true">Iniciar
          Sesión</button>
        <button class="auth-tab" data-tab="register" id="tab-register" role="tab"
          aria-selected="false">Registrarse</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form" novalidate aria-label="Formulario de inicio de sesión">
        <div class="form-group">
          <label for="login-email" class="form-label">Correo electrónico</label>
          <input type="email" id="login-email" class="form-input" placeholder="tucorreo@ejemplo.com" required
            autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="login-password" class="form-label">Contraseña</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••" required
            autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="btn-login">Iniciar Sesión</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" class="auth-form" style="display:none" novalidate aria-label="Formulario de registro">
        <div class="form-group">
          <label for="register-email" class="form-label">Correo electrónico</label>
          <input type="email" id="register-email" class="form-input" placeholder="tucorreo@ejemplo.com" required
            autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="register-password" class="form-label">Contraseña <span class="field-hint">(mín. 6
              caracteres)</span></label>
          <input type="password" id="register-password" class="form-input" placeholder="Mínimo 6 caracteres" required
            autocomplete="new-password" minlength="6" />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="btn-register">Crear Cuenta</button>
      </form>

      <!-- Feedback messages -->
      <div id="auth-error" class="auth-error" role="alert" style="display:none"></div>
      <div id="auth-success" class="auth-success" role="status" style="display:none"></div>

      <!-- OAuth Divider -->
      <div class="auth-divider"><span>o continuar con</span></div>

      <!-- OAuth Buttons -->
      <div class="oauth-btns">
        <button id="btn-google" class="btn-oauth btn-oauth-google" type="button" aria-label="Iniciar sesión con Google">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
            <path fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          Google
        </button>
        <button id="btn-github" class="btn-oauth btn-oauth-github" type="button" aria-label="Iniciar sesión con GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path
              d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z" />
          </svg>
          GitHub
        </button>
      </div>

    </div>
  </div>

  <!-- ══════════════════════════════════════
       APP: HEADER (visible when logged in)
  ══════════════════════════════════════ -->
  <header class="header" id="app-header" style="display:none">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <h1 class="logo-title">TaskFlow</h1>
      </div>
      <div class="header-right">
        <div class="user-info" id="user-info">
          <div class="user-avatar" id="user-avatar">U</div>
          <span class="user-email" id="user-email"></span>
        </div>
        <button id="btn-add-task" class="btn btn-primary" aria-label="Agregar nueva tarea">
          <span aria-hidden="true">+</span> Nueva Tarea
        </button>
        <button id="btn-logout" class="btn btn-ghost btn-sm" aria-label="Cerrar sesión">↩ Salir</button>
      </div>
    </div>
  </header>

  <!-- ══════════════════════════════════════
       APP: MAIN (visible when logged in)
  ══════════════════════════════════════ -->
  <main class="main" id="app-main" style="display:none">

    <!-- STATS BAR -->
    <section class="stats-bar" aria-label="Resumen de tareas">
      <div class="stat-card">
        <span class="stat-number" id="stat-total">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-card accent-pending">
        <span class="stat-number" id="stat-pending">0</span>
        <span class="stat-label">Pendientes</span>
      </div>
      <div class="stat-card accent-done">
        <span class="stat-number" id="stat-done">0</span>
        <span class="stat-label">Completadas</span>
      </div>
    </section>

    <!-- SEARCH & FILTERS -->
    <section class="controls" aria-label="Búsqueda y filtros">
      <div class="search-wrapper">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input type="text" id="search-input" class="search-input" placeholder="Buscar por título o descripción..."
          aria-label="Buscar tareas" />
        <button id="btn-clear-search" class="btn-clear" aria-label="Limpiar búsqueda" style="display:none">✕</button>
      </div>
      <div class="filter-group" role="group" aria-label="Filtrar por estado">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="pending">Pendientes</button>
        <button class="filter-btn" data-filter="completed">Completadas</button>
      </div>
    </section>

    <!-- TASK LIST -->
    <section class="task-section" aria-label="Lista de tareas">
      <div id="task-list" class="task-list"></div>
      <div id="empty-state" class="empty-state" style="display:none">
        <div class="empty-icon" aria-hidden="true">📋</div>
        <p class="empty-title">No hay tareas aquí</p>
        <p class="empty-sub">Agrega una nueva tarea o cambia el filtro</p>
      </div>
    </section>

  </main>

  <!-- ══════════════════════════════════════
       MODAL: ADD / EDIT TASK
  ══════════════════════════════════════ -->
  <div id="task-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title"
    style="display:none">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-heading">Nueva Tarea</h2>
        <button id="btn-close-modal" class="btn-icon-close" aria-label="Cerrar modal">✕</button>
      </div>
      <form id="task-form" novalidate>
        <input type="hidden" id="task-id" value="" />
        <div class="form-group">
          <label for="task-title" class="form-label">Título <span class="required">*</span></label>
          <input type="text" id="task-title" class="form-input" placeholder="Ej: Revisar informe mensual" maxlength="80"
            required aria-required="true" />
          <span class="field-error" id="error-title" role="alert"></span>
        </div>
        <div class="form-group">
          <label for="task-desc" class="form-label">Descripción <span class="required">*</span></label>
          <textarea id="task-desc" class="form-textarea" placeholder="Describe los detalles de la tarea..." rows="4"
            maxlength="300" required aria-required="true"></textarea>
          <span class="field-error" id="error-desc" role="alert"></span>
          <span class="char-count" id="char-count">0 / 300</span>
        </div>
        <div class="modal-actions">
          <button type="button" id="btn-cancel-modal" class="btn btn-ghost">Cancelar</button>
          <button type="submit" id="btn-save-task" class="btn btn-primary">Guardar Tarea</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       CONFIRM DELETE DIALOG
  ══════════════════════════════════════ -->
  <div id="confirm-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-title"
    style="display:none">
    <div class="modal-card modal-sm">
      <div class="modal-header">
        <h2 id="confirm-title" class="modal-heading">Eliminar Tarea</h2>
      </div>
      <p class="confirm-text">¿Estás seguro de que deseas eliminar esta tarea? Esta acción no se puede deshacer.</p>
      <div class="modal-actions">
        <button id="btn-cancel-delete" class="btn btn-ghost">Cancelar</button>
        <button id="btn-confirm-delete" class="btn btn-danger">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Supabase JS v2 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>

</html>
